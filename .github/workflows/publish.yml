name: Publish weekly sermon

on:
  # Sunday 10:05 AM Asia/Manila (UTC+8) == 02:05 UTC
  schedule:
    - cron: "5 2 * * 0"
  # Allow manual test runs from the Actions tab.
  workflow_dispatch:

# Needed so the workflow can commit the updated processed.json back to the repo.
permissions:
  contents: write

concurrency:
  group: publish-sermon
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp
          yt-dlp --version

      - name: Install dependencies
        run: npm ci

      - name: Write YouTube cookies (optional)
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then
            printf '%s' "$YT_COOKIES" > cookies.txt
            echo "Wrote cookies.txt"
          else
            echo "No YT_COOKIES secret set; skipping."
          fi

      - name: Run publisher
        env:
          YOUTUBE_PLAYLIST_ID: ${{ secrets.YOUTUBE_PLAYLIST_ID }}
          CUE_PHRASE: ${{ secrets.CUE_PHRASE }}
          CONFIDENCE_THRESHOLD: ${{ secrets.CONFIDENCE_THRESHOLD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          TRANSISTOR_API_KEY: ${{ secrets.TRANSISTOR_API_KEY }}
          TRANSISTOR_SHOW_ID: ${{ secrets.TRANSISTOR_SHOW_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          EMAIL_ENABLED: ${{ secrets.EMAIL_ENABLED }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
          ALERT_TO: ${{ secrets.ALERT_TO }}
          YT_COOKIES_FILE: ${{ secrets.YT_COOKIES != '' && 'cookies.txt' || '' }}
        run: node src/index.js

      - name: Commit processed.json if changed
        run: |
          rm -f cookies.txt
          if ! git diff --quiet -- processed.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add processed.json
            git commit -m "chore: record processed sermon [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
